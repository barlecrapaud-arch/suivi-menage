<script type="text/babel">

const MANAGER_AUTH = { identifiant: "manager", motDePasse: "hotel5662" };

const SYNC_ACTIF = FIREBASE_CONFIG.databaseURL.indexOf("VOTRE_PROJET") === -1;
let dbChambres = null;
if (SYNC_ACTIF && window.firebase) {

// ---------- Configuration des statuts ----------
const STATUTS = {
  propre:       { label: "Propre / Prête",     court: "Prête",        couleur: "#22c55e", bg: "#dcfce7", texte: "#14532d", icone: "✓" },
  a_faire:      { label: "À faire",            court: "À faire",      couleur: "#3b82f6", bg: "#dbeafe", texte: "#1e3a8a", icone: "•" },
  en_cours:     { label: "En cours de ménage", court: "En cours",     couleur: "#f59e0b", bg: "#fef3c7", texte: "#78350f", icone: "↻" },
  probleme:     { label: "Problème signalé",   court: "Problème",     couleur: "#ef4444", bg: "#fee2e2", texte: "#7f1d1d", icone: "!" },
  ne_pas_faire: { label: "Ne pas faire (occupée)", court: "Ne pas faire", couleur: "#6b7280", bg: "#f1f5f9", texte: "#475569", icone: "⛔" },
};
const ORDRE_STATUTS = ["propre", "a_faire", "en_cours", "probleme", "ne_pas_faire"];
const TYPES_PROBLEME = ["Plomberie", "Électricité", "Linge manquant", "Autre"];

// Type de séjour : départ = ménage complet, séjour = rafraîchissement
const SEJOURS = {
  depart: { label: "Départ (ménage complet)", court: "Départ", icone: "🛎", bg: "#1e293b", texte: "#ffffff" },
  sejour: { label: "Séjour (rafraîchissement)", court: "Séjour", icone: "✦", bg: "#e2e8f0", texte: "#334155" },
};
const STORAGE_KEY = "suivi_menage_hotel_v2";

// ---------- Données initiales : 5 étages × 10 chambres (101-110 ... 501-510) ----------
const ETAGES = [1, 2, 3, 4, 5];
function genererChambres() {
  const chambres = {};
  ETAGES.forEach((etage) => {
    for (let n = 1; n <= 10; n++) {
      const id = etage * 100 + n;
      chambres[id] = { id, etage, statut: "a_faire", sejour: "depart", dateDepart: null, assignee: null, note: "", probleme: null, maj: Date.now(), employe: null, debut: null, fin: null };
    }
  });
  return chambres;
}

function chargerEtat() {
  try {
    const brut = localStorage.getItem(STORAGE_KEY);
    if (brut) {
      const data = JSON.parse(brut);
      if (data && data.chambres) return data.chambres;
    }
  } catch (e) {}
  return genererChambres();
}

function sauvegarder(chambres) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ chambres })); } catch (e) {}
}

function heureCourte(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  return d.toLocaleTimeString("fr-CA", { hour: "2-digit", minute: "2-digit" });
}

// Date du jour au format "AAAA-MM-JJ" (zéros inclus) pour comparer aux dates de départ
function aujourdHuiISO() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

// Formate une date "AAAA-MM-JJ" en texte court (ex. « 18 juin »)
function formatDateDepart(s) {
  if (!s) return "";
  const p = s.split("-").map(Number);
  if (p.length < 3) return s;
  return new Date(p[0], p[1] - 1, p[2]).toLocaleDateString("fr-CA", { day: "numeric", month: "short" });
}

// Son d'alerte (bip) via Web Audio
let _audioCtx = null;
function amorcerAudio() {
  try {
    _audioCtx = _audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state === "suspended") _audioCtx.resume();
  } catch (e) {}
}
function bip() {
  try {
    amorcerAudio();
    if (!_audioCtx) return;
    const o = _audioCtx.createOscillator(), g = _audioCtx.createGain();
    o.type = "sine"; o.frequency.value = 880; o.connect(g); g.connect(_audioCtx.destination);
    g.gain.setValueAtTime(0.001, _audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.3, _audioCtx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 0.45);
    o.start(); o.stop(_audioCtx.currentTime + 0.45);
  } catch (e) {}
}

// Rang de priorité du ménage (0 = le plus urgent)
function priorite(c, today) {
  if (c.statut === "a_faire" && c.dateDepart === today) return 0; // départ du jour à nettoyer
  if (c.statut === "en_cours") return 1;                          // finir ce qui est commencé
  if (c.statut === "a_faire") return 2;                           // à faire (sans départ aujourd'hui)
  if (c.statut === "probleme") return 3;
  if (c.statut === "ne_pas_faire") return 4;
  return 5;                                                       // propre
}

function formatMs(ms) {
  if (ms == null || ms < 0) return "—";
  const totMin = Math.floor(ms / 60000);
  const h = Math.floor(totMin / 60);
  const min = totMin % 60;
  const sec = Math.floor((ms % 60000) / 1000);
  if (h > 0) return h + " h " + String(min).padStart(2, "0") + " min";
  if (totMin > 0) return min + " min " + String(sec).padStart(2, "0") + " s";
  return sec + " s";
}

function dureeTexte(debut, fin) {
  if (!debut) return "—";
  return formatMs((fin || Date.now()) - debut);
}

// Agrège les ménages terminés par préposée : { nom: { count, totalMs } }
function totauxParPreposee(chambres) {
  const acc = {};
  Object.values(chambres).forEach((c) => {
    if (c.statut === "propre" && c.debut && c.fin && c.employe) {
      if (!acc[c.employe]) acc[c.employe] = { count: 0, totalMs: 0 };
      acc[c.employe].count += 1;
      acc[c.employe].totalMs += c.fin - c.debut;
    }
  });
  return Object.entries(acc)
    .map(([nom, v]) => ({ nom, ...v }))
    .sort((a, b) => b.totalMs - a.totalMs);
}

// ---------- Export PDF du rapport de fin de journée ----------
function exporterPDF(chambres) {
  if (!window.jspdf || !window.jspdf.jsPDF) { alert("Librairie PDF non chargée. Vérifiez votre connexion Internet."); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const now = new Date();
  const dateStr = now.toLocaleDateString("fr-CA", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
  const heureStr = now.toLocaleTimeString("fr-CA", { hour: "2-digit", minute: "2-digit" });

  const compteur = (st) => Object.values(chambres).filter((c) => c.statut === st).length;
  const terminees = Object.values(chambres).filter((c) => c.statut === "propre" && c.debut && c.fin).sort((a, b) => a.id - b.id);
  const problemes = Object.values(chambres).filter((c) => c.statut === "probleme").sort((a, b) => a.id - b.id);
  const totaux = totauxParPreposee(chambres);

  // En-tête
  doc.setFillColor(27, 67, 50);
  doc.rect(0, 0, 210, 26, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(16); doc.setFont(undefined, "bold");
  doc.text("Rapport d'entretien — Fin de journée", 14, 12);
  doc.setFontSize(10); doc.setFont(undefined, "normal");
  doc.text(dateStr + "  ·  " + heureStr, 14, 19);

  let y = 34;
  doc.setTextColor(30, 41, 59);
  doc.setFontSize(12); doc.setFont(undefined, "bold");
  doc.text("Résumé", 14, y); y += 2;
  doc.autoTable({
    startY: y + 2,
    head: [["Prêtes", "À faire", "En cours", "Problèmes"]],
    body: [[compteur("propre"), compteur("a_faire"), compteur("en_cours"), compteur("probleme")]],
    theme: "grid", headStyles: { fillColor: [45, 106, 79] }, styles: { halign: "center", fontSize: 11 },
  });
  y = doc.lastAutoTable.finalY + 6;

  const tempsMoyen = terminees.length ? terminees.reduce((a, c) => a + (c.fin - c.debut), 0) / terminees.length : 0;
  const departsRestants = Object.values(chambres).filter((c) => (c.sejour || "depart") === "depart" && c.statut !== "propre").length;
  doc.setFontSize(10); doc.setFont(undefined, "normal"); doc.setTextColor(71, 85, 105);
  doc.text("Temps moyen par chambre : " + (terminees.length ? formatMs(tempsMoyen) : "—")
    + "     |     Départs restants : " + departsRestants
    + "     |     Chambres terminées : " + terminees.length, 14, y);
  doc.setTextColor(30, 41, 59);
  y += 8;

  // Totaux par préposée
  doc.setFontSize(12); doc.setFont(undefined, "bold");
  doc.text("Temps total par préposée", 14, y);
  doc.autoTable({
    startY: y + 2,
    head: [["Préposée", "Chambres faites", "Temps total"]],
    body: totaux.length ? totaux.map((t) => [t.nom, t.count, formatMs(t.totalMs)]) : [["Aucune donnée", "—", "—"]],
    theme: "striped", headStyles: { fillColor: [45, 106, 79] },
  });
  y = doc.lastAutoTable.finalY + 10;

  // Ménages terminés
  doc.setFontSize(12); doc.setFont(undefined, "bold");
  doc.text("Ménages terminés", 14, y);
  doc.autoTable({
    startY: y + 2,
    head: [["Chambre", "Séjour", "Préposée", "Début", "Fin", "Durée"]],
    body: terminees.length ? terminees.map((c) => [
      c.id, SEJOURS[c.sejour || "depart"].court, c.employe || "—", heureCourte(c.debut), heureCourte(c.fin), formatMs(c.fin - c.debut),
    ]) : [["Aucun ménage terminé", "", "", "", "", ""]],
    theme: "striped", headStyles: { fillColor: [34, 197, 94] },
  });
  y = doc.lastAutoTable.finalY + 10;

  // Problèmes
  doc.setFontSize(12); doc.setFont(undefined, "bold");
  doc.text("Problèmes signalés", 14, y);
  doc.autoTable({
    startY: y + 2,
    head: [["Chambre", "Type", "Description"]],
    body: problemes.length ? problemes.map((c) => [
      c.id, c.probleme ? c.probleme.type : "—", c.probleme ? c.probleme.desc || "—" : "—",
    ]) : [["Aucun problème", "", ""]],
    theme: "striped", headStyles: { fillColor: [239, 68, 68] },
  });

  doc.save("rapport-entretien-" + now.toISOString().slice(0, 10) + ".pdf");
}

// ---------- Carte d'une chambre ----------
function CarteChambre({ ch, onClick }) {
  const s = STATUTS[ch.statut];
  const sej = SEJOURS[ch.sejour || "depart"];
  return (
    <button
      onClick={() => onClick(ch)}
      className="relative flex flex-col items-center justify-center rounded-2xl bg-white shadow-sm active:scale-95 transition-transform aspect-square focus:outline-none overflow-hidden px-1"
      style={{ borderLeft: `6px solid ${s.couleur}` }}
    >
      <span className="absolute top-1.5 right-1.5 px-1.5 py-0.5 rounded-md text-[9px] font-bold leading-none"
        style={{ background: sej.bg, color: sej.texte }} title={sej.label}>
        {sej.icone}
      </span>
      {ch.note && <span className="absolute top-1.5 left-1.5 text-[11px] leading-none" title="Note">📝</span>}
      <span className="text-3xl font-extrabold text-slate-800 leading-none">{ch.id}</span>
      <span
        className="mt-2 px-2 py-0.5 rounded-lg text-[10px] font-semibold leading-tight text-center max-w-full"
        style={{ background: s.bg, color: s.texte }}
      >
        {s.icone} {s.court}
      </span>
      {ch.assignee && <span className="mt-1 text-[10px] font-semibold text-emerald-700 truncate max-w-[90%] px-1">👤 {ch.assignee}</span>}
      {ch.dateDepart
        ? <span className="mt-0.5 text-[10px] font-semibold text-slate-500">🛎 {formatDateDepart(ch.dateDepart)}</span>
        : (!ch.assignee && ch.maj && <span className="mt-1 text-[10px] text-slate-400">{heureCourte(ch.maj)}</span>)}
    </button>
  );
}

// ---------- Modal d'actions employé ----------
function ModalChambre({ ch, onChange, onClose, onSejour, estManager, onDate, onAssignee, nomsConnus, onNote }) {
  const [mode, setMode] = useState("actions"); // actions | probleme | debut
  const [typeP, setTypeP] = useState(TYPES_PROBLEME[0]);
  const [desc, setDesc] = useState("");
  const [nom, setNom] = useState(ch.employe || "");
  const refDate = React.useRef(null);
  const refAssignee = React.useRef(null);
  const refNote = React.useRef(null);
  const s = STATUTS[ch.statut];

  const maj = (statut, extra = {}) => { onChange(ch.id, statut, extra); onClose(); };
  const demarrer = () => {
    if (!nom.trim()) return;
    onChange(ch.id, "en_cours", { employe: nom.trim(), debut: Date.now(), fin: null });
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40 p-0 sm:p-4" onClick={onClose}>
      <div className="w-full sm:max-w-md bg-white rounded-t-3xl sm:rounded-3xl p-5 pb-8 shadow-2xl" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div>
            <h2 className="text-2xl font-extrabold text-slate-800">Chambre {ch.id}</h2>
            <span className="inline-flex items-center gap-1 mt-1 px-2 py-0.5 rounded-full text-xs font-semibold" style={{ background: s.bg, color: s.texte }}>
              {s.icone} {s.label}
            </span>
          </div>
          <button onClick={onClose} className="text-slate-400 text-3xl leading-none px-2">×</button>
        </div>

        {ch.probleme && (
          <div className="mb-4 rounded-xl bg-red-50 border border-red-200 p-3 text-sm text-red-800">
            <strong>{ch.probleme.type}</strong>{ch.probleme.desc ? " — " + ch.probleme.desc : ""}
          </div>
        )}

        {/* Date de départ : modifiable par le manager, en lecture seule sinon */}
        <div className="mb-4 rounded-xl bg-slate-50 border border-slate-200 p-3">
          <div className="text-xs font-semibold text-slate-500 mb-1">🛎 Date de départ</div>
          {estManager ? (
            <div className="flex items-center gap-2">
              <input ref={refDate} type="date" defaultValue={ch.dateDepart || ""}
                onClick={(e) => { try { if (e.currentTarget.showPicker) e.currentTarget.showPicker(); } catch (_) {} }}
                onChange={(e) => onDate(ch.id, e.target.value)} onBlur={(e) => onDate(ch.id, e.target.value)}
                className="flex-1 rounded-lg border-2 border-slate-200 px-3 text-base focus:border-emerald-500 focus:outline-none"
                style={{ minHeight: "48px", WebkitAppearance: "none", appearance: "none", background: "#fff" }} />
              <button onClick={() => { if (refDate.current) refDate.current.value = ""; onDate(ch.id, null); }}
                className="px-3 rounded-lg text-slate-500 border border-slate-200 text-sm font-semibold" style={{ minHeight: "48px" }}>Effacer</button>
            </div>
          ) : (
            <div className="text-base font-bold text-slate-700">
              {ch.dateDepart ? formatDateDepart(ch.dateDepart) : "Non définie"}
              <span className="block text-[11px] font-normal text-slate-400">Modifiable par le manager</span>
            </div>
          )}
        </div>

        {/* Assignation : modifiable par le manager, en lecture seule sinon */}
        <div className="mb-4 rounded-xl bg-slate-50 border border-slate-200 p-3">
          <div className="text-xs font-semibold text-slate-500 mb-1">👤 Assignée à</div>
          {estManager ? (
            <div className="flex items-center gap-2">
              <input ref={refAssignee} list="liste-preposes" defaultValue={ch.assignee || ""} placeholder="Nom de la préposée..."
                autoCapitalize="words" autoCorrect="off"
                onChange={(e) => onAssignee(ch.id, e.target.value)} onBlur={(e) => onAssignee(ch.id, e.target.value)}
                className="flex-1 rounded-lg border-2 border-slate-200 px-3 text-base focus:border-emerald-500 focus:outline-none"
                style={{ minHeight: "48px", background: "#fff" }} />
              <datalist id="liste-preposes">
                {(nomsConnus || []).map((n) => <option key={n} value={n} />)}
              </datalist>
              <button onClick={() => { if (refAssignee.current) refAssignee.current.value = ""; onAssignee(ch.id, null); }}
                className="px-3 rounded-lg text-slate-500 border border-slate-200 text-sm font-semibold" style={{ minHeight: "48px" }}>Effacer</button>
            </div>
          ) : (
            <div className="text-base font-bold text-slate-700">
              {ch.assignee || "Non assignée"}
              <span className="block text-[11px] font-normal text-slate-400">Modifiable par le manager</span>
            </div>
          )}
        </div>

        {/* Note libre : modifiable par tous */}
        <div className="mb-4">
          <div className="text-xs font-semibold text-slate-500 mb-1">📝 Note</div>
          <textarea ref={refNote} defaultValue={ch.note || ""} rows={2} placeholder="Note libre (objet trouvé, demande client...)"
            onBlur={(e) => onNote(ch.id, e.target.value)}
            className="w-full rounded-xl border-2 border-slate-200 p-3 text-base focus:border-emerald-500 focus:outline-none resize-none" />
        </div>

        {mode === "actions" && (
          <div className="flex flex-col gap-3">
            <div>
              <div className="text-xs font-semibold text-slate-500 mb-1.5">Type de séjour</div>
              <div className="grid grid-cols-2 gap-2">
                {["depart", "sejour"].map((k) => (
                  <button key={k} onClick={() => onSejour(ch.id, k)}
                    className={"py-2.5 rounded-xl text-sm font-bold border-2 transition flex items-center justify-center gap-1 " + ((ch.sejour || "depart") === k ? "border-emerald-700 bg-emerald-50 text-emerald-800" : "border-slate-200 text-slate-500")}>
                    {SEJOURS[k].icone} {SEJOURS[k].court}
                  </button>
                ))}
              </div>
            </div>
            <button onClick={() => setMode("debut")} className="w-full py-4 rounded-2xl text-white text-lg font-bold shadow active:scale-95 transition" style={{ background: "#f59e0b" }}>
              ↻ Commencer le ménage
            </button>
            <button onClick={() => maj("propre", { fin: Date.now() })} className="w-full py-4 rounded-2xl text-white text-lg font-bold shadow active:scale-95 transition" style={{ background: "#22c55e" }}>
              ✓ Ménage terminé
            </button>
            <button onClick={() => setMode("probleme")} className="w-full py-4 rounded-2xl text-white text-lg font-bold shadow active:scale-95 transition" style={{ background: "#ef4444" }}>
              ! Signaler un problème
            </button>
            <button onClick={() => maj("a_faire", { employe: null, debut: null, fin: null })} className="w-full py-3 rounded-2xl text-blue-700 text-base font-semibold border-2 border-blue-200 active:scale-95 transition">
              • Remettre « À faire »
            </button>
          </div>
        )}

        {mode === "debut" && (
          <div className="flex flex-col gap-3">
            <label className="text-sm font-semibold text-slate-600">Préposée à l'entretien</label>
            <input value={nom} onChange={(e) => setNom(e.target.value)} placeholder="Nom de la préposée..." autoFocus
              className="w-full rounded-xl border-2 border-slate-200 p-3 text-base focus:border-amber-400 focus:outline-none" />
            <button onClick={demarrer} disabled={!nom.trim()}
              className="w-full py-4 rounded-2xl text-white text-lg font-bold shadow active:scale-95 transition disabled:opacity-40"
              style={{ background: "#f59e0b" }}>
              ↻ Démarrer le chrono
            </button>
            <button onClick={() => setMode("actions")} className="w-full py-2 text-slate-500 font-semibold">← Retour</button>
          </div>
        )}

        {mode === "probleme" && (
          <div className="flex flex-col gap-3">
            <label className="text-sm font-semibold text-slate-600">Type de problème</label>
            <div className="grid grid-cols-2 gap-2">
              {TYPES_PROBLEME.map((t) => (
                <button key={t} onClick={() => setTypeP(t)}
                  className={"py-3 rounded-xl text-sm font-semibold border-2 transition " + (typeP === t ? "border-red-500 bg-red-50 text-red-700" : "border-slate-200 text-slate-600")}>
                  {t}
                </button>
              ))}
            </div>
            <label className="text-sm font-semibold text-slate-600 mt-1">Description courte</label>
            <textarea value={desc} onChange={(e) => setDesc(e.target.value)} rows={3} placeholder="Ex : fuite sous le lavabo..."
              className="w-full rounded-xl border-2 border-slate-200 p-3 text-base focus:border-red-400 focus:outline-none resize-none" />
            <button onClick={() => maj("probleme", { probleme: { type: typeP, desc: desc.trim(), maj: Date.now() } })}
              className="w-full py-4 rounded-2xl text-white text-lg font-bold shadow active:scale-95 transition" style={{ background: "#ef4444" }}>
              Valider le signalement
            </button>
            <button onClick={() => setMode("actions")} className="w-full py-2 text-slate-500 font-semibold">← Retour</button>
          </div>
        )}
      </div>
    </div>
  );
}

                <div className="text-sm font-semibold text-red-700 mt-1">{c.probleme ? c.probleme.type : "Problème"}</div>
                {c.probleme && c.probleme.desc && <div className="text-sm text-slate-500 mt-0.5">{c.probleme.desc}</div>}
                <div className="text-[11px] text-slate-400 mt-1">Signalé à {heureCourte(c.probleme ? c.probleme.maj : c.maj)}</div>

              <button onClick={() => onResoudre(c.id, "propre")} className="flex-1 py-3 rounded-xl bg-green-600 text-white font-bold text-sm active:scale-95 transition">Résolu → Propre</button>

// ---------- Modal de connexion Manager ----------
function ModalLogin({ onSuccess, onClose }) {
  const refId = React.useRef(null);
  const refMdp = React.useRef(null);
  const [erreur, setErreur] = useState(false);

  const valider = () => {
    const idVal = (refId.current ? refId.current.value : "").trim().toLowerCase();
    const mdpVal = (refMdp.current ? refMdp.current.value : "").trim();
    if (idVal === MANAGER_AUTH.identifiant.trim().toLowerCase() && mdpVal === MANAGER_AUTH.motDePasse.trim()) {
      onSuccess();
    } else {
      setErreur(true);
    }
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick={onClose}>
      <div className="w-full max-w-sm bg-white rounded-3xl p-6 shadow-2xl" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-1">
          <h2 className="text-2xl font-extrabold text-slate-800">🔒 Mode Manager</h2>
          <button onClick={onClose} className="text-slate-400 text-3xl leading-none px-2">×</button>
        </div>
        <p className="text-sm text-slate-500 mb-4">Connexion requise pour accéder à la gestion.</p>
        <div className="flex flex-col gap-3">
          <input ref={refId} defaultValue={MANAGER_AUTH.identifiant} placeholder="Identifiant"
            autoCapitalize="none" autoCorrect="off" autoComplete="off" spellCheck={false} onChange={() => setErreur(false)}
            onKeyDown={(e) => { if (e.key === "Enter") valider(); }}
            className="w-full rounded-xl border-2 border-slate-200 p-3 text-base focus:border-emerald-500 focus:outline-none" />
          <input ref={refMdp} type="password" placeholder="Mot de passe" autoFocus
            autoCapitalize="none" autoCorrect="off" autoComplete="off" spellCheck={false} onChange={() => setErreur(false)}
            onKeyDown={(e) => { if (e.key === "Enter") valider(); }}
            className="w-full rounded-xl border-2 border-slate-200 p-3 text-base focus:border-emerald-500 focus:outline-none" />
          {erreur && <div className="text-sm font-semibold text-red-600 text-center">Identifiant ou mot de passe incorrect.</div>}
          <button onClick={valider} className="w-full py-4 rounded-2xl text-white text-lg font-bold shadow active:scale-95 transition" style={{ background: "linear-gradient(135deg, var(--foret), var(--foret2))" }}>
            Se connecter
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------- Application principale ----------
function App() {
  const [chambres, setChambres] = useState(chargerEtat);
  const [manager, setManager] = useState(false);
  const [authManager, setAuthManager] = useState(false);
  const [loginOuvert, setLoginOuvert] = useState(false);
  const [filtre, setFiltre] = useState("tous");
  const [filtrePreposee, setFiltrePreposee] = useState("tous");
  const [tri, setTri] = useState("numero"); // numero | priorite
  const [selection, setSelection] = useState(null);
  const [heure, setHeure] = useState(new Date());
  const [connecte, setConnecte] = useState(false);
  const [alerte, setAlerte] = useState(null);
  const prevProb = React.useRef(null);

  // Notifications manager : détecte les nouveaux problèmes signalés
  useEffect(() => {
    const ids = Object.values(chambres).filter((c) => c.statut === "probleme").map((c) => c.id);
    if (prevProb.current === null) { prevProb.current = ids; return; }
    const nouveaux = ids.filter((id) => !prevProb.current.includes(id));
    prevProb.current = ids;
    if (nouveaux.length && authManager) {
      const noms = nouveaux.join(", ");
      setAlerte("Problème signalé — Chambre " + noms);
      bip();
      try {
        if ("Notification" in window && Notification.permission === "granted") {
          new Notification("⚠ Problème signalé", { body: "Chambre " + noms, tag: "probleme-" + noms });
        }
      } catch (e) {}
      setTimeout(() => setAlerte(null), 8000);
    }
  }, [chambres, authManager]);

  // Sauvegarde locale (cache hors ligne)
  useEffect(() => { sauvegarder(chambres); }, [chambres]);
  useEffect(() => { const t = setInterval(() => setHeure(new Date()), 1000); return () => clearInterval(t); }, []);

  // Synchronisation temps réel via Firebase
  useEffect(() => {
    if (!SYNC_ACTIF || !dbChambres) return;
    const cb = dbChambres.on("value", (snap) => {
      const val = snap.val();
      if (val) setChambres(val);
      else dbChambres.set(genererChambres()); // initialise la base au 1er lancement
    });
    const refCon = firebase.database().ref(".info/connected");
    refCon.on("value", (s) => setConnecte(!!s.val()));
    return () => { dbChambres.off("value", cb); refCon.off(); };
  }, []);

  const changerStatut = (id, statut, extra = {}) => {
    const c = chambres[id];
    const maj = { ...c, statut, maj: Date.now() };
    maj.probleme = ("probleme" in extra) ? extra.probleme : (statut === "probleme" ? maj.probleme : null);
    if ("employe" in extra) maj.employe = extra.employe;
    if ("debut" in extra) maj.debut = extra.debut;
    if ("fin" in extra) maj.fin = extra.fin;
    if (SYNC_ACTIF && dbChambres) dbChambres.child(String(id)).set(maj); // l'écouteur mettra à jour l'état
    setChambres((prev) => ({ ...prev, [id]: maj }));
  };

  const changerSejour = (id, sejour) => {
    const maj = { ...chambres[id], sejour, maj: Date.now() };
    if (SYNC_ACTIF && dbChambres) dbChambres.child(String(id)).set(maj);
    setChambres((prev) => ({ ...prev, [id]: maj }));
  };

  const changerAssignee = (id, assignee) => {
    const maj = { ...chambres[id], assignee: (assignee && assignee.trim()) ? assignee.trim() : null, maj: Date.now() };
    if (SYNC_ACTIF && dbChambres) dbChambres.child(String(id)).set(maj);
    setChambres((prev) => ({ ...prev, [id]: maj }));
  };

  const changerNote = (id, note) => {
    const maj = { ...chambres[id], note: (note || "").trim(), maj: Date.now() };
    if (SYNC_ACTIF && dbChambres) dbChambres.child(String(id)).set(maj);
    setChambres((prev) => ({ ...prev, [id]: maj }));
  };

  const changerDate = (id, dateDepart) => {
    const c = chambres[id];
    let statut = c.statut;
    if (dateDepart) {
      // Date future → on bloque le ménage ; date du jour ou passée → à faire
      statut = (dateDepart > aujourdHuiISO()) ? "ne_pas_faire" : "a_faire";
    } else if (c.statut === "ne_pas_faire") {
      statut = "a_faire"; // date effacée → on débloque
    }
    const maj = { ...c, dateDepart: dateDepart || null, statut, maj: Date.now() };
    if (SYNC_ACTIF && dbChambres) dbChambres.child(String(id)).set(maj);
    setChambres((prev) => ({ ...prev, [id]: maj }));
  };

  // Réinitialisation de la journée : « À faire », sauf les chambres avec un départ futur (« Ne pas faire »)
  const reinitialiser = () => {
    const today = aujourdHuiISO();
    const next = {};
    Object.values(chambres).forEach((c) => {
      const statut = (c.dateDepart && c.dateDepart > today) ? "ne_pas_faire" : "a_faire";
      next[c.id] = { ...c, statut, probleme: null, employe: null, debut: null, fin: null, maj: Date.now() };
    });
    if (SYNC_ACTIF && dbChambres) dbChambres.set(next);
    setChambres(next);
  };

  // Bascule auto : une chambre « Ne pas faire » repasse « À faire » quand la date de départ est atteinte
  useEffect(() => {
    const verifierDeparts = () => {
      const today = aujourdHuiISO();
      setChambres((prev) => {
        let change = false;
        const next = { ...prev };
        Object.values(prev).forEach((c) => {
          if (c.statut === "ne_pas_faire" && c.dateDepart && c.dateDepart <= today) {
            next[c.id] = { ...c, statut: "a_faire", maj: Date.now() };
            change = true;
            if (SYNC_ACTIF && dbChambres) dbChambres.child(String(c.id)).set(next[c.id]);
          }
        });
        return change ? next : prev;
      });
    };
    verifierDeparts();
    const t = setInterval(verifierDeparts, 60000);
    return () => clearInterval(t);
  }, []);

  // Réinitialisation automatique au changement de jour (1re ouverture de la journée)
  useEffect(() => {
    const RESET_KEY = STORAGE_KEY + "_jour";
    const verifier = () => {
      const d = new Date();
      const jour = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
      const dernier = localStorage.getItem(RESET_KEY);
      if (dernier !== jour) {
        localStorage.setItem(RESET_KEY, jour);
        if (dernier !== null) reinitialiser(); // ne pas réinitialiser au tout 1er lancement
      }
    };
    verifier();
    const t = setInterval(verifier, 60000);
    return () => clearInterval(t);
  }, []);

  const allerEtage = (etage) => {
    const el = document.getElementById("etage-" + etage);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  const compteur = (st) => Object.values(chambres).filter((c) => c.statut === st).length;
  const total = Object.keys(chambres).length;
  const progression = total ? Math.round((compteur("propre") / total) * 100) : 0;
  const today = aujourdHuiISO();
  const departsJour = Object.values(chambres).filter((c) => c.dateDepart === today).length;
  const nomsConnus = [...new Set(Object.values(chambres).map((c) => c.assignee).filter(Boolean))].sort();

  let liste = Object.values(chambres).filter((c) => {
    if (filtrePreposee !== "tous" && c.assignee !== filtrePreposee) return false;
    if (filtre === "tous") return true;
    if (filtre === "departs_jour") return c.dateDepart === today;
    return c.statut === filtre;
  });
  if (tri === "priorite") {
    liste = [...liste].sort((a, b) => priorite(a, today) - priorite(b, today) || a.id - b.id);
  }

  return (
    <div className="min-h-screen max-w-2xl mx-auto">
      {/* Bannière d'alerte (nouveau problème) */}
      {alerte && (
        <div onClick={() => { setManager(true); setAlerte(null); }}
          className="fixed top-3 left-1/2 -translate-x-1/2 z-[60] w-[92%] max-w-md cursor-pointer rounded-2xl bg-red-600 text-white px-4 py-3 shadow-2xl flex items-center justify-between gap-3 animate-pulse">
          <span className="font-bold text-sm">⚠ {alerte}</span>
          <span className="text-xs underline whitespace-nowrap">Voir</span>
        </div>
      )}

      {/* En-tête */}
      <header className="px-4 pt-5 pb-3 text-white shadow-lg" style={{ background: "linear-gradient(135deg, var(--foret), var(--foret2))" }}>
        <div className="flex items-center justify-between">
          <div>
            <h1 className="text-xl font-extrabold leading-tight">Suivi Ménage</h1>
            <p className="text-[12px] text-emerald-100/80 flex items-center gap-1.5">
              Hôtel · 50 chambres · {heure.toLocaleTimeString("fr-CA", { hour: "2-digit", minute: "2-digit" })}
              {SYNC_ACTIF && (
                <span className="inline-flex items-center gap-1">· <span className="w-2 h-2 rounded-full" style={{ background: connecte ? "#4ade80" : "#fbbf24" }}></span>{connecte ? "Synchronisé" : "Connexion..."}</span>
              )}
            </p>
          </div>
          <button onClick={() => {
              if (manager) setManager(false);
              else if (authManager) setManager(true);
              else setLoginOuvert(true);
            }}
            className={"px-4 py-2 rounded-full text-sm font-bold transition active:scale-95 " + (manager ? "bg-white text-emerald-900" : "bg-white/15 text-white border border-white/30")}>
            {manager ? "← Vue chambres" : "🔒 Mode Manager"}
          </button>
        </div>

        {/* Barre de progression globale */}
        <div className="mt-3">
          <div className="flex items-center justify-between text-[11px] text-emerald-50/90 mb-1">
            <span>Progression du jour</span>
            <span className="font-bold">{progression}% prêtes</span>
          </div>
          <div className="w-full h-2.5 rounded-full bg-white/20 overflow-hidden">
            <div className="h-full rounded-full transition-all duration-500" style={{ width: progression + "%", background: "#4ade80" }}></div>
          </div>
        </div>

        {/* Résumé */}
        <div className="grid grid-cols-5 gap-1.5 mt-3">
          {ORDRE_STATUTS.map((st) => (
            <div key={st} className="rounded-xl bg-white/10 backdrop-blur px-1 py-2 text-center">
              <div className="text-xl font-extrabold">{compteur(st)}</div>
              <div className="text-[9px] text-emerald-50/90 leading-tight">{STATUTS[st].court}</div>
            </div>
          ))}
        </div>
      </header>

      {manager ? (
        <VueManager chambres={chambres} maintenant={heure} onResoudre={(id, st) => changerStatut(id, st)}
          onReinitialiser={reinitialiser}
          onDeconnexion={() => { setAuthManager(false); setManager(false); }} />
      ) : (
        <>
          {/* Barre de contrôle collante : onglets d'étages + filtres */}
          <div className="sticky top-0 z-20 bg-[#f1f5f4] shadow-sm">
            <div className="flex gap-2 overflow-x-auto px-4 pt-3 pb-1">
              {ETAGES.map((e) => (
                <button key={e} onClick={() => allerEtage(e)}
                  className="whitespace-nowrap px-3 py-1.5 rounded-full text-sm font-bold bg-emerald-900 text-white active:scale-95 transition">
                  Ét. {e}
                </button>
              ))}
            </div>
            <div className="flex gap-2 overflow-x-auto px-4 py-2">
              {[["tous", "Tous"], ["departs_jour", "🛎 Départs auj. (" + departsJour + ")"], ...ORDRE_STATUTS.map((s) => [s, STATUTS[s].court])].map(([k, lbl]) => (
                <button key={k} onClick={() => setFiltre(k)}
                  className={"whitespace-nowrap px-4 py-2 rounded-full text-sm font-semibold transition active:scale-95 " + (filtre === k ? "bg-emerald-900 text-white" : "bg-white text-slate-600 border border-slate-200")}>
                  {lbl}
                </button>
              ))}
            </div>
            <div className="flex gap-2 items-center px-4 pb-2">
              <select value={filtrePreposee} onChange={(e) => setFiltrePreposee(e.target.value)}
                className="rounded-full px-3 py-1.5 text-sm font-semibold bg-white text-slate-600 border border-slate-200 max-w-[55%]">
                <option value="tous">👤 Toutes les préposées</option>
                {nomsConnus.map((n) => <option key={n} value={n}>{n}</option>)}
              </select>
              <button onClick={() => setTri(tri === "numero" ? "priorite" : "numero")}
                className="whitespace-nowrap px-3 py-1.5 rounded-full text-sm font-semibold bg-white text-slate-600 border border-slate-200 active:scale-95 transition">
                Tri : {tri === "numero" ? "N°" : "⚡ Priorité"}
              </button>
            </div>
          </div>

          {/* Chambres regroupées par étage */}
          <div className="px-4 pb-24">
            {ETAGES.map((etage) => {
              const chambresEtage = liste.filter((c) => c.etage === etage);
              if (chambresEtage.length === 0) return null;
              return (
                <div key={etage} id={"etage-" + etage} className="mb-6" style={{ scrollMarginTop: "110px" }}>
                  <h2 className="text-base font-bold text-slate-700 mb-3 flex items-center gap-2">
                    <span className="w-7 h-7 rounded-lg bg-emerald-900 text-white flex items-center justify-center text-sm">{etage}</span>
                    Étage {etage}
                    <span className="text-xs font-normal text-slate-400">({chambresEtage.length})</span>
                  </h2>
                  <div className="grid grid-cols-3 sm:grid-cols-5 gap-3">
                    {chambresEtage.map((ch) => <CarteChambre key={ch.id} ch={ch} onClick={setSelection} />)}
                  </div>
                </div>
              );
            })}
            {liste.length === 0 && <div className="text-center text-slate-400 py-10">Aucune chambre dans ce filtre.</div>}
          </div>
        </>
      )}

      {selection && (
        <ModalChambre ch={chambres[selection.id]} onChange={changerStatut} onSejour={changerSejour} onDate={changerDate} onAssignee={changerAssignee} onNote={changerNote} nomsConnus={nomsConnus} estManager={authManager} onClose={() => setSelection(null)} />
      )}

      {loginOuvert && (
        <ModalLogin onSuccess={() => {
            setAuthManager(true); setManager(true); setLoginOuvert(false);
            amorcerAudio();
            try { if ("Notification" in window && Notification.permission === "default") Notification.requestPermission(); } catch (e) {}
          }} onClose={() => setLoginOuvert(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
  // Service worker pour le mode hors ligne (actif seulement en https/http, pas en fichier local)
  if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function (e) { console.log("SW non enregistré:", e); });
    });
  }
</script>
</body>
</html>
